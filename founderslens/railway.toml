[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/health"
timeout = 30

[environments.production]
# Tool API keys are set at Railway dashboard level.
# Only LLM keys are user-provided at runtime via FastAPI requests.
